<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>High on Art — Spliff & Paint Experience</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <style>
        /* ── Reset & base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        /* ── Custom scrollbar ── */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #d4a843;
            border-radius: 10px;
        }

        /* ── Scene container ── */
        .scene {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 2rem 1.5rem;
        }
        .scene-content {
            max-width: 1200px;
            width: 100%;
            z-index: 10;
            position: relative;
        }

        /* ── Gold shimmer text ── */
        .gold-text {
            background: linear-gradient(135deg, #f7e05e, #d4a843, #f7e05e, #b8860b);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmerGold 4s ease-in-out infinite alternate;
        }
        @keyframes shimmerGold {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 100% 50%;
            }
        }

        /* ── Gold border glow ── */
        .gold-glow {
            box-shadow: 0 0 40px rgba(212, 168, 67, 0.15), 0 0 80px rgba(212, 168, 67, 0.05);
            border: 1px solid rgba(212, 168, 67, 0.2);
        }

        /* ── Particle canvas ── */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ── Smoke overlay ── */
        .smoke-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            opacity: 0.3;
            background: radial-gradient(ellipse at 30% 80%, rgba(200, 180, 150, 0.15) 0%, transparent 70%),
                radial-gradient(ellipse at 70% 60%, rgba(180, 160, 130, 0.1) 0%, transparent 60%);
            animation: smokeDrift 12s ease-in-out infinite alternate;
        }
        @keyframes smokeDrift {
            0% {
                transform: translateX(-10px) scale(1);
                opacity: 0.25;
            }
            100% {
                transform: translateX(10px) scale(1.05);
                opacity: 0.4;
            }
        }

        /* ── Twinkling lights ── */
        .twinkle {
            animation: twinkle 2.4s ease-in-out infinite alternate;
        }
        .twinkle:nth-child(2) {
            animation-delay: 0.6s;
        }
        .twinkle:nth-child(3) {
            animation-delay: 1.2s;
        }
        .twinkle:nth-child(4) {
            animation-delay: 0.3s;
        }
        .twinkle:nth-child(5) {
            animation-delay: 0.9s;
        }
        @keyframes twinkle {
            0% {
                opacity: 0.2;
                transform: scale(0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1.1);
            }
        }

        /* ── Car slide-in ── */
        .car-slide {
            animation: carSlide 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateX(80px);
        }
        .car-slide:nth-child(1) {
            animation-delay: 0.1s;
        }
        .car-slide:nth-child(2) {
            animation-delay: 0.4s;
        }
        .car-slide:nth-child(3) {
            animation-delay: 0.7s;
        }
        .car-slide:nth-child(4) {
            animation-delay: 1.0s;
        }
        @keyframes carSlide {
            0% {
                opacity: 0;
                transform: translateX(80px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ── Pulse button ── */
        .pulse-ring {
            animation: pulseRing 2s ease-in-out infinite;
        }
        @keyframes pulseRing {
            0% {
                box-shadow: 0 0 0 0 rgba(212, 168, 67, 0.4);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(212, 168, 67, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(212, 168, 67, 0);
            }
        }

        /* ── Fade in up ── */
        .fade-up {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .fade-up.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── HOA logo pulse ── */
        .logo-pulse {
            animation: logoPulse 3s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%,
            100% {
                filter: drop-shadow(0 0 20px rgba(212, 168, 67, 0.2));
            }
            50% {
                filter: drop-shadow(0 0 60px rgba(212, 168, 67, 0.5));
            }
        }

        /* ── Typing cursor ── */
        .typing-cursor::after {
            content: '|';
            animation: blink 1s step-end infinite;
            color: #d4a843;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* ── Responsive tweaks ── */
        @media (max-width: 768px) {
            .scene {
                padding: 1.5rem 1rem;
            }
            .scene-content {
                padding: 0;
            }

                font-size: 2.5rem !important;
            }
        }
        @media (max-width: 480px) {
            .gold-text {
                font-size: 1.8rem !important;
            }
        }

        /* ── Scene 1 special: full black with particles ── */
        #scene1 {
            background: #0a0a0a;
        }
        #scene1 .overlay-text {
            position: relative;
            z-index: 5;
        }

        /* ── Scene 2 sunset gradient ── */
        #scene2 {
            background: linear-gradient(180deg, #1a0e0a 0%, #4a1f1a 30%, #8a4a3a 55%, #c47a4a 75%, #f0c87a 100%);
        }

        /* ── Scene 3: dark with road feel ── */
        #scene3 {
            background: #0d0d0d;
        }

        /* ── Scene 4: warm dusk ── */
        #scene4 {
            background: linear-gradient(180deg, #1a1410 0%, #3a2a1a 40%, #5a3a2a 70%, #8a6a4a 100%);
        }

        /* ── Scene 5: painting area ── */
        #scene5 {
            background: linear-gradient(180deg, #1a1a0a 0%, #2a2a1a 40%, #3a3a2a 70%, #4a4a3a 100%);
        }

        /* ── Scene 6: food court ── */
        #scene6 {
            background: linear-gradient(180deg, #1a0e0a 0%, #2a1a0e 40%, #3a2a1a 70%, #2a1a0a 100%);
        }

        /* ── Scene 7: music ── */
        #scene7 {
            background: linear-gradient(180deg, #0a0a1a 0%, #1a0a2a 40%, #2a1a3a 70%, #1a0a2a 100%);
        }

        /* ── Scene 8: golden hour ── */
        #scene8 {
            background: linear-gradient(180deg, #2a1a0a 0%, #5a3a1a 30%, #c47a3a 60%, #f0c87a 85%, #f5dcaa 100%);
        }

        /* ── Scene 9: CTA ── */
        #scene9 {
            background: #0a0a0a;
        }

        /* ── Custom grid for cars ── */
        .car-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 2rem;
            justify-items: center;
        }

        /* ── Painting easel cards ── */
        .easel-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 1.5rem 1rem;
            transition: all 0.4s ease;
        }
        .easel-card:hover {
            transform: translateY(-6px);
            border-color: rgba(212, 168, 67, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        /* ── Food vendor cards ── */
        .vendor-card {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            transition: all 0.3s ease;
        }
        .vendor-card:hover {
            transform: scale(1.02);
            border-color: rgba(212, 168, 67, 0.2);
        }

        /* ── DJ deck visual ── */
        .dj-deck {
            background: radial-gradient(ellipse at 50% 80%, rgba(212, 168, 67, 0.1), transparent 70%);
            border-radius: 50%;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            border: 1px solid rgba(212, 168, 67, 0.15);
            animation: deckPulse 2s ease-in-out infinite alternate;
        }
        @keyframes deckPulse {
            0% {
                box-shadow: 0 0 30px rgba(212, 168, 67, 0.05);
            }
            100% {
                box-shadow: 0 0 60px rgba(212, 168, 67, 0.15);
            }
        }

        /* ── Water sponsor badge ── */
        .water-badge {
            background: linear-gradient(135deg, rgba(30, 144, 255, 0.15), rgba(0, 200, 255, 0.05));
            border: 1px solid rgba(30, 144, 255, 0.2);
            border-radius: 100px;
            padding: 0.4rem 1.2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            backdrop-filter: blur(4px);
        }

        /* ── Scroll hint ── */
        .scroll-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            animation: bounceDown 2.4s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }
        .scroll-hint .arrow {
            display: block;
            width: 20px;
            height: 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            transform: rotate(45deg);
            animation: arrowBounce 2.4s ease-in-out infinite;
        }
        @keyframes bounceDown {
            0%,
            100% {
                transform: translateX(-50%) translateY(0);
                opacity: 0.3;
            }
            50% {
                transform: translateX(-50%) translateY(8px);
                opacity: 0.8;
            }
        }
        @keyframes arrowBounce {
            0%,
            100% {
                transform: rotate(45deg) translate(0, 0);
                opacity: 0.3;
            }
            50% {
                transform: rotate(45deg) translate(4px, 4px);
                opacity: 0.8;
            }
        }

        /* ── Scene number badge ── */
        .scene-badge {
            position: absolute;
            top: 1.5rem;
            right: 2rem;
            z-index: 30;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.12);
            font-weight: 300;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
            padding: 0.3rem 0.9rem;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* ── Mobile adjustments ── */
        @media (max-width: 640px) {
            .scene-badge {
                display: none;
            }
            .car-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
            .scroll-hint {
                bottom: 1rem;
            }
        }

        /* ── Smooth entrance for scenes ── */
        .scene-enter {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .scene-enter.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Gold button ── */
        .btn-gold {
            background: linear-gradient(135deg, #f7e05e, #d4a843, #b8860b);
            color: #0a0a0a;
            font-weight: 600;
            padding: 1rem 2.5rem;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            letter-spacing: 0.02em;
            box-shadow: 0 4px 30px rgba(212, 168, 67, 0.25);
        }
        .btn-gold:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 50px rgba(212, 168, 67, 0.4);
        }
        .btn-gold:active {
            transform: scale(0.97);
        }

        /* ── Music visualiser bars ── */
        .visualizer {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 40px;
        }
        .visualizer .bar {
            width: 4px;
            background: linear-gradient(to top, #d4a843, #f7e05e);
            border-radius: 2px;
            animation: vizBounce 0.6s ease-in-out infinite alternate;
        }
        .visualizer .bar:nth-child(1) {
            height: 20px;
            animation-delay: 0.0s;
        }
        .visualizer .bar:nth-child(2) {
            height: 35px;
            animation-delay: 0.1s;
        }
        .visualizer .bar:nth-child(3) {
            height: 15px;
            animation-delay: 0.2s;
        }
        .visualizer .bar:nth-child(4) {
            height: 40px;
            animation-delay: 0.3s;
        }
        .visualizer .bar:nth-child(5) {
            height: 25px;
            animation-delay: 0.15s;
        }
        .visualizer .bar:nth-child(6) {
            height: 30px;
            animation-delay: 0.25s;
        }
        .visualizer .bar:nth-child(7) {
            height: 18px;
            animation-delay: 0.35s;
        }
        .visualizer .bar:nth-child(8) {
            height: 38px;
            animation-delay: 0.05s;
        }
        @keyframes vizBounce {
            0% {
                transform: scaleY(0.4);
                opacity: 0.5;
            }
            100% {
                transform: scaleY(1);
                opacity: 1;
            }
        }
    </style>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<body>

    <!-- ─── ROOT ─── -->
    <div id="root"></div>

    <!-- ─── IMPORT MAP ─── -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "framer-motion": "https://esm.sh/framer-motion@10.16.4"
            }
        }
    </script>

    <!-- ─── MAIN APP ─── -->
    <script type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useInView, AnimatePresence } from 'framer-motion';

        // ─── Utility: Intersection observer hook ───
        function useIntersection(options = { threshold: 0.2 }) {
            const ref = useRef(null);
            const inView = useInView(ref, options);
            return [ref, inView];
        }

        // ─── Particle Canvas Component ───
        function ParticleCanvas({ count = 80, color = '#d4a843' }) {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');

                let w, h;
                const particles = [];

                const resize = () => {
                    const rect = canvas.parentElement?.getBoundingClientRect();
                    w = rect?.width || window.innerWidth;
                    h = rect?.height || window.innerHeight;
                    canvas.width = w;
                    canvas.height = h;
                };
                resize();
                window.addEventListener('resize', resize);

                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        size: Math.random() * 3 + 1,
                        speedX: (Math.random() - 0.5) * 0.6,
                        speedY: (Math.random() - 0.5) * 0.6 - 0.2,
                        opacity: Math.random() * 0.6 + 0.2,
                        pulse: Math.random() * Math.PI * 2,
                    });
                }

                let frame = 0;

                const animate = () => {
                    frame++;
                    ctx.clearRect(0, 0, w, h);

                    particles.forEach((p) => {
                        p.x += p.speedX;
                        p.y += p.speedY;
                        p.pulse += 0.02;

                        if (p.x < 0) p.x = w;
                        if (p.x > w) p.x = 0;
                        if (p.y < 0) p.y = h;
                        if (p.y > h) p.y = 0;

                        const alpha = p.opacity * (0.6 + 0.4 * Math.sin(p.pulse));
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fillStyle = color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
                        ctx.fill();

                        // Glow
                        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 4);
                        grad.addColorStop(0, color.replace(')', `,${alpha * 0.15})`).replace('rgb', 'rgba'));
                        grad.addColorStop(1, color.replace(')', `,0)`).replace('rgb', 'rgba'));
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
                        ctx.fill();
                    });

                    requestAnimationFrame(animate);
                };

                animate();

                return () => {
                    window.removeEventListener('resize', resize);
                };
            }, [count, color]);

            return <canvas ref={canvasRef} id="particle-canvas" style={{ position: 'absolute', top: 0, left: 0, width: '100%',
                    height: '100%', pointerEvents: 'none', zIndex: 1 }} />;
        }

        // ─── Twinkling Lights ───
        function TwinklingLights({ count = 12 }) {
            const lights = [];
            for (let i = 0; i < count; i++) {
                const x = 5 + Math.random() * 90;
                const y = 5 + Math.random() * 90;
                const size = 4 + Math.random() * 8;
                const delay = Math.random() * 2;
                lights.push({ x, y, size, delay });
            }
            return ( <
                div style = { { position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: 'none',
                        zIndex: 2 } } >
                {
                    lights.map((l, i) => ( <
                        div key = { i }
                        className = "twinkle"
                        style = {
                            {
                                position: 'absolute',
                                left: l.x + '%',
                                top: l.y + '%',
                                width: l.size + 'px',
                                height: l.size + 'px',
                                borderRadius: '50%',
                                background: 'radial-gradient(circle, rgba(255,230,180,0.8), rgba(212,168,67,0.1))',
                                boxShadow: '0 0 20px rgba(212,168,67,0.3)',
                                animationDelay: l.delay + 's',
                            }
                        }
                        />
                    ))
                } <
                /div>
            );
        }

        // ─── Scene 1: Wealth Creative Entertainment Presents ───
        function Scene1() {
            const [ref, inView] = useIntersection({ threshold: 0.1 });
            return ( <
                    section id = "scene1"
                    className = "scene" >
                    <
                    ParticleCanvas count = { 100 }
                    color = "#d4a843" / >
                    <
                    div className = "scene-content text-center overlay-text"
                    ref = { ref } >
                    <
                    motion.div initial = { { opacity: 0, y: 40 } }
                    animate = { inView ? { opacity: 1, y: 0 } : { opacity: 0, y: 40 } }
                    transition = { { duration: 1.2, ease: [0.22, 1, 0.36, 1] } } >
                    <
                    p className = "text-xs tracking-[0.3em] uppercase text-white/30 mb-6" >
                    Wealth Creative Entertainment Presents <
                    /p> <
                    div className = "flex justify-center mb-6" >
                    <
                    div className = "w-20 h-20 rounded-full border border-[#d4a843]/20 flex items-center justify-center" >
                    <
                    span className = "text-4xl" > 🎨 < /span> <
                    /div> <
                    /div> <
                    h1 className = "text-5xl sm:text-7xl md:text-8xl font-bold gold-text tracking-tight leading-none" >
                    HIGH ON ART <
                    /h1> <
                    p className = "mt-6 text-white/40 text-sm tracking-[0.2em] uppercase" >
                    Spliff & Paint Experience <
                    /p> <
                    div className = "mt-8 flex justify-center gap-2" >
                    <
                    span className = "w-2 h-2 rounded-full bg-[#d4a843]/30" > < /span> <
                    span className = "w-2 h-2 rounded-full bg-[#d4a843]/60" > < /span> <
                    span className = "w-2 h-2 rounded-full bg-[#d4a843]/30" > < /span> <
                    /div> <
                    /motion.div> <
                    div className = "scroll-hint" >
                    <
                    span > Scroll < /span> <
                    span className = "arrow" > < /span> <
                    /div> <
                    /section>
                );
            }

            // ─── Scene 2: Pretoria Sunset + HOA Logo ───
            function Scene2() {
                const [ref, inView] = useIntersection({ threshold: 0.2 });
                return ( <
                        section id = "scene2"
                        className = "scene" >
                        <
                        div className = "absolute inset-0 bg-gradient-to-t from-[#1a0e0a]/80 via-transparent to-transparent z-0" >
                        <
                        /div> <
                        TwinklingLights count = { 15 }
                        /> <
                        div className = "scene-content text-center relative z-10"
                        ref = { ref } >
                        <
                        motion.div initial = { { opacity: 0, scale: 0.9 } }
                        animate = { inView ? { opacity: 1, scale: 1 } : { opacity: 0, scale: 0.9 } }
                        transition = { { duration: 1.2, ease: [0.22, 1, 0.36, 1] } } >
                        <
                        div className = "inline-block mb-4 px-4 py-1 rounded-full border border-[#d4a843]/20 bg-black/20 backdrop-blur-sm" >
                        <
                        span className = "text-[#d4a843] text-xs tracking-widest" > PRETORIA • SUNSET < /span> <
                        /div> <
                        div className = "logo-pulse" >
                        <
                        div className = "text-8xl sm:text-9xl md:text-[10rem] font-extrabold gold-text tracking-tight leading-none" >
                        HOA <
                        /div> <
                        /div> <
                        div className = "mt-4 flex justify-center gap-6 text-white/30 text-sm tracking-widest" >
                        <
                        span > ART < /span> <
